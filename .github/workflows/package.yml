name: Package & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6 and Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            qt6-base-dev \
            qt6-declarative-dev \
            cmake \
            g++ \
            libsecret-1-dev \
            libssl-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            imagemagick
          cargo install cargo-deb
      - name: Create Placeholder Icon
        run: |
          mkdir -p assets/icons
          if [ ! -f assets/icons/everydb.png ]; then
            # Create a simple blue 256x256 icon if missing
            convert -size 256x256 xc:blue assets/icons/everydb.png
          fi
      - name: Build Deb
        run: cargo deb -p everydb
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: everydb-deb
          path: target/debian/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:39
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          dnf install -y \
            rust \
            cargo \
            qt6-qtbase-devel \
            qt6-qtdeclarative-devel \
            openssl-devel \
            rpm-build \
            cmake \
            gcc-c++ \
            libsecret-devel \
            ImageMagick
          cargo install cargo-generate-rpm
      - name: Create Placeholder Icon
        run: |
          mkdir -p assets/icons
          if [ ! -f assets/icons/everydb.png ]; then
            convert -size 256x256 xc:blue assets/icons/everydb.png
          fi
      - name: Build
        run: cargo build --release -p everydb
      - name: Build RPM
        run: cargo generate-rpm -p everydb
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: everydb-rpm
          path: target/generate-rpm/*.rpm

  release:
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/everydb-deb/*.deb
            artifacts/everydb-rpm/*.rpm